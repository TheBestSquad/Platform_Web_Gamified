<nav class="bg-blue-600 p-4 text-white shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
        <a href="{% url 'home' %}" class="font-bold text-xl tracking-tight">EduDash</a>
        <div class="space-x-4">
            {% if user.is_authenticated %}
                <span class="text-blue-100">Olá, {{ user.first_name }}</span>

                {% if user.professor_profile %}
                    <a href="{% url 'lista_entregas' %}" class="hover:bg-blue-700 px-3 py-1 rounded text-sm transition border border-blue-400">
                        Minhas Correções
                    </a>
                {% endif %}

                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">Sair</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="hover:underline">Login</a>
                <a href="{% url 'register_professor' %}" class="bg-white text-blue-600 px-3 py-1 rounded font-semibold text-sm">Sou Professor</a>
            {% endif %}
        </div>
    </div>
</nav>
