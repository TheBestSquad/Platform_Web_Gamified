<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gamifica UNIVESP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

    <nav class="p-4 bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-400">🚀 CodeQuest</h1>
            <div>
                <span class="mr-4">Nível 1</span>
                <span class="bg-blue-600 px-3 py-1 rounded-full text-sm">100 XP</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto flex-grow p-6">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="p-4 bg-gray-800 text-center text-gray-500 text-sm">
        &copy; 2026 PI 1 - Eixo de Computação UNIVESP
    </footer>

</body>
</html>
