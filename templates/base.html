<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gamifica UNIVESP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

    {% if user.is_authenticated %}
    <nav class="p-4 bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            
            <div class="flex-grow border-[3px] border-sky-500 rounded-full py-2 px-6 text-center flex flex-col justify-center bg-gray-900 w-full md:w-auto">
                <span class="font-bold text-md text-white">Pontuação/ranking etc.</span>
                <span class="text-xs text-gray-400">(Placeholder)</span>
            </div>
            
            <div class="flex gap-4">
                <button class="border-[2px] border-yellow-500 text-yellow-400 rounded-full py-2 px-6 font-bold hover:bg-yellow-500 hover:text-gray-900 transition whitespace-nowrap">
                    Perfil
                </button>
                <button class="border-[2px] border-yellow-500 text-yellow-400 rounded-full py-2 px-6 font-bold hover:bg-yellow-500 hover:text-gray-900 transition whitespace-nowrap">
                    Dados perfil
                </button>
            </div>

        </div>
    </nav>
    {% endif %}

    <main class="container mx-auto flex-grow p-6">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="p-4 bg-gray-800 text-center text-gray-500 text-sm">
        &copy; 2026 PI 1 - Eixo de Computação UNIVESP
    </footer>

</body>
</html>
