{% extends "base.html" %}

{% block content %}
<div class="flex justify-center items-center mt-12 mb-12">
    <div class="bg-gray-800 text-white p-8 rounded-[3rem] border border-gray-700 w-full max-w-sm flex flex-col items-center shadow-lg">
        
        <a href="{% url 'cadastro' %}" class="w-3/4 border border-gray-500 rounded-lg py-2 text-center font-bold text-gray-300 hover:bg-gray-700 hover:text-white transition">
            Cadastro
        </a>
        
        <span class="my-5 font-bold text-lg text-gray-400">OU</span>
        
        <h2 class="text-4xl font-extrabold mb-6 text-white">Login</h2>
        
        {% if messages %}
            {% for message in messages %}
                {% if message.tags == 'success' %}
                <div class="bg-green-600 text-white text-sm font-bold px-4 py-2 rounded-lg mb-4 w-full text-center shadow-md">
                    {{ message }}
                </div>
                {% endif %}
            {% endfor %}
        {% endif %}
        
        <form method="post" action="{% url 'login' %}" class="w-full flex flex-col gap-4">
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="Email" required
                   class="w-full bg-gray-900 border border-gray-600 text-white placeholder-gray-400 rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <input type="password" name="password" placeholder="Senha" required
                   class="w-full bg-gray-900 border border-gray-600 text-white placeholder-gray-400 rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <button type="submit" 
                    class="mt-4 bg-blue-600 text-white font-bold rounded-lg py-2 px-10 self-center hover:bg-blue-700 transition shadow-md">
                Enviar
            </button>
        </form>
    </div>
</div>

{% if form.errors %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const inputLogin = document.querySelector("input[name='username']");
        if (inputLogin) {
            inputLogin.setCustomValidity("Email ou senha incorretos.");
            inputLogin.reportValidity();
            
            inputLogin.addEventListener('input', function() {
                inputLogin.setCustomValidity('');
            });
        }
    });
</script>
{% endif %}
{% endblock %}
