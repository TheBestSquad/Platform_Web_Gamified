{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-slate-100">
        <h2 class="text-center text-3xl font-black text-slate-900 uppercase tracking-tighter">Nova Senha</h2>
        <form method="POST" class="mt-8 space-y-6">
            {% csrf_token %}
            <div class="space-y-4 text-sm font-medium text-slate-600">
                {% for field in form %}
                    <div>
                        {{ field.label_tag }}
                        <div class="mt-1">
                            {{ field }}
                        </div>
                        {% if field.help_text %}
                            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">{{ field.help_text }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <button type="submit" class="w-full py-3 px-4 text-sm font-black rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-all uppercase tracking-widest">
                Confirmar Nova Senha
            </button>
        </form>
    </div>
</div>
{% endblock %}
