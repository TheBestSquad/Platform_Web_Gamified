{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center bg-white p-10 rounded-2xl shadow-xl border border-slate-100">
        <div class="mb-6 flex justify-center">
            <div class="bg-blue-50 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
        </div>
        <h2 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">E-mail Enviado!</h2>
        <p class="mt-4 text-slate-500 font-medium leading-relaxed">
            Enviamos as instruções para redefinir sua senha. Se não receber em instantes, verifique sua caixa de **Spam**.
        </p>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="text-xs font-black text-blue-600 hover:text-blue-500 uppercase tracking-widest border-b-2 border-blue-600 pb-1">Voltar ao Login</a>
        </div>
    </div>
</div>
{% endblock %}
