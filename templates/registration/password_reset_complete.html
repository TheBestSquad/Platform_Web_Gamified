{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center bg-white p-10 rounded-2xl shadow-xl border border-slate-100">
        <div class="mb-6 flex justify-center text-green-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h2 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Senha Alterada!</h2>
        <p class="mt-4 text-slate-500 font-medium leading-relaxed">Sua nova senha foi salva com sucesso. Você já pode fazer login na plataforma.</p>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="inline-block py-3 px-8 bg-blue-600 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 shadow-lg">Fazer Login</a>
        </div>
    </div>
</div>
{% endblock %}
