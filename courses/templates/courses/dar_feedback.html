{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <div class="bg-white rounded-2xl p-8 border-4 border-slate-800 shadow-xl">
        <h2 class="text-2xl font-black mb-4 uppercase">Corrigindo: {{ entrega.aluno.user.first_name }}</h2>
        <p class="text-slate-500 font-bold mb-6 italic">Lição: {{ entrega.licao.titulo }}</p>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-slate-50 p-6 rounded-xl border-2 border-slate-100">
                <h3 class="font-black text-slate-400 uppercase text-xs mb-2">Resposta em Texto:</h3>
                <p class="text-slate-800 leading-relaxed">{{ entrega.resposta_texto|linebreaks }}</p>
            </div>

            <div class="bg-slate-900 p-6 rounded-xl border-4 border-slate-800">
                <h3 class="font-black text-slate-500 uppercase text-xs mb-2">Script Enviado:</h3>
                <pre class="text-green-400 font-mono text-sm whitespace-pre-wrap">{{ entrega.codigo_enviado }}</pre>
            </div>
        </div>
    </div>

    <form method="POST" class="bg-yellow-50 rounded-2xl p-8 border-2 border-yellow-200 shadow-lg">
        {% csrf_token %}
        <h3 class="text-xl font-black text-yellow-800 mb-4 uppercase">Avaliação</h3>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-1">
                <label class="block font-bold text-yellow-900 mb-1">Nota (0 a 10):</label>
                <input type="number" step="0.1" name="nota" value="{{ entrega.nota|default:'' }}" class="w-full border-2 border-yellow-300 rounded-xl p-3 focus:ring-2 focus:ring-yellow-500 outline-none font-black text-xl" required>
            </div>
            <div class="md:col-span-3">
                <label class="block font-bold text-yellow-900 mb-1">Feedback / Comentários:</label>
                <textarea name="feedback" rows="3" class="w-full border-2 border-yellow-300 rounded-xl p-3 focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="Muito bem! A lógica está correta...">{{ entrega.feedback|default:'' }}</textarea>
            </div>
        </div>

        <button type="submit" class="w-full mt-6 bg-slate-800 hover:bg-black text-white font-black py-4 rounded-xl transition-all uppercase tracking-widest">
            SALVAR CORREÇÃO E ENVIAR AO ALUNO
        </button>
    </form>
</div>
{% endblock %}
