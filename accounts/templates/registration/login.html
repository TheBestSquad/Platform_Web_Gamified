<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Plataforma</title>
</head>
<body>
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>
    <hr>
    <p>Ainda não tem conta?</p>
    <a href="{% url 'register_professor' %}">Cadastrar como Professor</a> |
    <a href="{% url 'register_aluno' %}">Cadastrar como Aluno</a>
</body>
</html>
