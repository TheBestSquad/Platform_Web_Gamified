{% extends 'base.html' %}

{% block title %}Login - Plataforma{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow-lg rounded-lg overflow-hidden mt-10">
    <div class="py-4 px-6 bg-blue-600">
        <h2 class="text-2xl font-bold text-white text-center">Acesse sua Conta</h2>
    </div>

    <form method="post" class="py-4 px-6">
        {% csrf_token %}

        {% if form.errors %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                E-mail ou senha incorretos.
            </div>
        {% endif %}

        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="username">E-mail (Username)</label>
            <input name="username" id="username" type="text" required
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Senha</label>
            <input name="password" id="password" type="password" required
                class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex items-center justify-between">
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition duration-300">
                Entrar
            </button>
        </div>
    </form>

    <div class="bg-gray-50 py-4 px-6 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-600">Ainda não tem conta?</p>
        <div class="mt-2 space-x-2">
            <a href="{% url 'register_professor' %}" class="text-blue-600 hover:underline font-semibold">Sou Professor</a>
            <span class="text-gray-300">|</span>
            <a href="{% url 'register_aluno' %}" class="text-blue-600 hover:underline font-semibold">Sou Aluno</a>
        </div>
    </div>
</div>
{% endblock %}
