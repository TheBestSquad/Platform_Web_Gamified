{% extends 'base.html' %}

{% block title %}Cadastro de Professor{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden">
    <div class="py-4 px-6 bg-green-600 text-white text-center font-bold text-xl">
        Cadastro de Docente
    </div>

    <form method="POST" class="p-6 space-y-4">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Nome Completo</label>
                <input type="text" name="first_name" required class="w-full border rounded p-2 focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">E-mail</label>
                <input type="email" name="email" required class="w-full border rounded p-2 focus:ring-2 focus:ring-green-500 outline-none">
            </div>
        </div>

        <div>
            <label class="block text-gray-700 font-semibold mb-1">Formação Acadêmica</label>
            <input type="text" name="formacao" required class="w-full border rounded p-2 focus:ring-2 focus:ring-green-500 outline-none">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Contato (WhatsApp)</label>
                <input type="text" name="contato" required class="w-full border rounded p-2 focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Disciplina / Curso</label>
                <input type="text" name="disciplina_curso" required class="w-full border rounded p-2 focus:ring-2 focus:ring-green-500 outline-none">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t pt-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Senha</label>
                <input type="password" name="password" required class="w-full border rounded p-2 focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">Confirmar Senha</label>
                <input type="password" name="confirm_password" required class="w-full border rounded p-2 focus:ring-2 focus:ring-green-500 outline-none">
            </div>
        </div>

        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-md">
            Finalizar Cadastro do Professor
        </button>
    </form>
</div>
{% endblock %}
